services:
  postgres:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_DB: goszdrav
      POSTGRES_USER: goszdrav
      POSTGRES_PASSWORD: goszdrav
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goszdrav -d goszdrav"]
      interval: 5s
      timeout: 5s
      retries: 15
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  migrate:
    build: .
    restart: "no"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]

  bot:
    build: .
    restart: always
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: ["python", "-m", "goszdrav_bot.bot"]

  miniapp:
    build: .
    restart: always
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: ["python", "-m", "goszdrav_bot.api"]
    ports:
      - "${MINIAPP_PORT:-8080}:8080"

  worker:
    build: .
    restart: always
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: ["python", "-m", "goszdrav_bot.workers"]

volumes:
  postgres_data:
